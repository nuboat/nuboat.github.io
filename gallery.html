<!DOCTYPE HTML>
<html lang="en">
	<head>
		<title>Peerapat A - Gallery</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<meta name="description" content="View Peerapat A's image gallery featuring rate cards and professional showcases." />
		<link rel="stylesheet" href="./assets/css/main.css" />
		<link rel="stylesheet" href="./assets/css/ci.css" />
		<link rel="stylesheet" href="./assets/css/cookie-consent.css" />
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
		<meta name="author" content="Peerapat A" />
		
		<!-- Google tag (gtag.js) -->
		<script async src="https://www.googletagmanager.com/gtag/js?id=G-TKCX2DN0ZT"></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag(){dataLayer.push(arguments);}

			gtag('consent', 'default', { analytics_storage: 'denied' });
			var ccOk = false; try { ccOk = localStorage.getItem('cookie-consent') === 'accepted'; } catch (e) {}
			window['ga-disable-G-TKCX2DN0ZT'] = !ccOk;
			if (ccOk) { gtag('consent', 'update', { analytics_storage: 'granted' }); gtag('config', 'G-TKCX2DN0ZT'); }

		<style>
			/* Premium Gallery Styles */
			.gallery-container {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(280px, 400px));
				justify-content: center;
				gap: 1.5rem;
				padding: 2rem 0;
			}
			.gallery-item {
				position: relative;
				border-radius: 16px;
				overflow: hidden;
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
				transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
				background: rgba(255, 255, 255, 0.05);
				backdrop-filter: blur(10px);
				-webkit-backdrop-filter: blur(10px);
				border: 1px solid rgba(255, 255, 255, 0.1);
				cursor: pointer;
				aspect-ratio: 4/3;
			}

			.gallery-item:hover {
				transform: translateY(-8px) scale(1.03);
				box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
				z-index: 2;
			}
			.gallery-item img {
				width: 100%;
				height: 100%;
				object-fit: cover;
				display: block;
				transition: transform 0.5s ease;
			}
			.gallery-item:hover img {
				transform: scale(1.1);
			}
			
			/* Modal for viewing images */
			.gallery-modal {
				display: none;
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: rgba(0, 0, 0, 0.85);
				backdrop-filter: blur(8px);
				z-index: 10000;
				align-items: center;
				justify-content: center;
				opacity: 0;
				transition: opacity 0.3s ease;
			}
			.gallery-modal.active {
				display: flex;
				opacity: 1;
			}
			.gallery-modal img {
				max-width: 90%;
				max-height: 90vh;
				border-radius: 8px;
				box-shadow: 0 0 40px rgba(0,0,0,0.5);
				transform: scale(0.95);
				transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
				object-fit: contain;
			}
			.gallery-modal.active img {
				transform: scale(1);
			}
			.gallery-modal-close {
				position: absolute;
				top: 20px;
				right: 30px;
				color: white;
				font-size: 2rem;
				cursor: pointer;
				transition: color 0.2s ease;
				z-index: 10001;
			}
			.gallery-modal-close:hover {
				color: #f56a6a;
			}
		</style>
	</head>
	<!-- do not change layout -->
	<body class="is-preload page-gallery">

		<header class="major">
			<br />
			<div style="display: flex; justify-content: center; align-items: center; text-align: center;">
				<h2>Norbor Gallery</h2>
			</div>
		</header>
		
		<div class="gallery-container">
			<div class="gallery-item" onclick="openModal('gallery/rate_card.png')">
				<img src="gallery/rate_card.png" alt="Rate Card" loading="lazy" />
			</div>
			<div class="gallery-item" onclick="openModal('gallery/cat_live.jpeg')">
				<img src="gallery/cat_live.jpeg" alt="Cat Live" loading="lazy" />
			</div>
			<div class="gallery-item" onclick="openModal('gallery/harness.jpeg')">
				<img src="gallery/harness.jpeg" alt="Harness" loading="lazy" />
			</div>
			<div class="gallery-item" onclick="openModal('gallery/sign_doc.jpeg')">
				<img src="gallery/sign_doc.jpeg" alt="Sign Doc" loading="lazy" />
			</div>
		</div>
	
		<div class="inner" style="text-align: center;">
			<p class="copyright">&copy; peerapat.cc</p>
		</div>
	
		<!-- Gallery Modal -->
		<div class="gallery-modal" id="galleryModal" onclick="closeModal(event)">
			<i class="fa fa-times gallery-modal-close" onclick="closeModal(event)"></i>
			<img id="modalImage" src="" alt="Expanded Gallery Image" onclick="event.stopPropagation()" />
		</div>

		<script src="./assets/js/jquery.min.js"></script>
		<script src="./assets/js/jquery.poptrox.min.js"></script>
		<script src="./assets/js/browser.min.js"></script>
		<script src="./assets/js/breakpoints.min.js"></script>
		<script src="./assets/js/util.js"></script>
		<script src="./assets/js/main.js"></script>
		<script src="./assets/js/cookie-consent.js"></script>
		<script>
			// Modal logic
			const modal = document.getElementById('galleryModal');
			const modalImg = document.getElementById('modalImage');

			function openModal(imgSrc) {
				modalImg.src = imgSrc;
				modal.style.display = 'flex';
				// Trigger reflow for transition
				void modal.offsetWidth;
				modal.classList.add('active');
				document.body.style.overflow = 'hidden';
			}

			function closeModal(e) {
				if (e) e.stopPropagation();
				modal.classList.remove('active');
				setTimeout(() => {
					modal.style.display = 'none';
					document.body.style.overflow = '';
					modalImg.src = '';
				}, 300);
			}
			
			// Close modal on escape key
			document.addEventListener('keydown', function(e) {
				if (e.key === 'Escape' && modal.classList.contains('active')) {
					closeModal();
				}
			});
		</script>
	</body>
</html>
