		<script>
			(function () {
				var carousel = document.getElementById('main-carousel');
				if (!carousel) return;
				var track = carousel.querySelector('.carousel-track');
				var slides = Array.prototype.slice.call(carousel.querySelectorAll('.carousel-slide'));
				var dotsWrap = carousel.querySelector('.carousel-dots');
				var prev = carousel.querySelector('.carousel-nav.prev');
				var next = carousel.querySelector('.carousel-nav.next');
				var current = 0;

				// build one dot per slide
				var dots = slides.map(function (slide, i) {
					var dot = document.createElement('button');
					dot.type = 'button';
					dot.className = 'carousel-dot';
					dot.setAttribute('role', 'tab');
					dot.setAttribute('aria-label', 'Slide ' + (i + 1));
					dot.addEventListener('click', function () { goTo(i); });
					dotsWrap.appendChild(dot);
					return dot;
				});

				function setActive(i) {
					current = i;
					dots.forEach(function (d, j) {
						d.classList.toggle('is-active', j === i);
						d.setAttribute('aria-selected', j === i ? 'true' : 'false');
					});
					prev.disabled = i === 0;
					next.disabled = i === slides.length - 1;
				}

				function goTo(i) {
					i = Math.max(0, Math.min(slides.length - 1, i));
					track.scrollTo({ left: slides[i].offsetLeft - track.offsetLeft, behavior: 'smooth' });
					setActive(i);
				}

				prev.addEventListener('click', function () { goTo(current - 1); });
				next.addEventListener('click', function () { goTo(current + 1); });

				// keep dots in sync when the user swipes/scrolls the track
				if ('IntersectionObserver' in window) {
					var io = new IntersectionObserver(function (entries) {
						entries.forEach(function (entry) {
							if (entry.isIntersecting) setActive(slides.indexOf(entry.target));
						});
					}, { root: track, threshold: 0.6 });
					slides.forEach(function (s) { io.observe(s); });
				}

				setActive(0);
			})();
		</script>
